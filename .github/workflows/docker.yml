name: Build & Push Docker Images

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'landing/**'
      - 'runtime/**'
      - 'scripts/install.sh'
      - 'scripts/update.sh'
      - 'scripts/patch.sh'
      - 'scripts/worker-setup.sh'
      - '.github/workflows/docker.yml'
  workflow_dispatch:

jobs:
  # ── CI (fmt/clippy/build/test + frontend/landing typecheck) ────────────────
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml

  # ── Backend ────────────────────────────────────────────────────────────────
  backend:
    name: Backend
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/shipyard-backend
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short

      - name: Set build metadata
        id: build-meta
        run: |
          echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT
          echo "git_sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          echo "migrations_hash=$(find backend/crates/db/migrations -type f -name '*.sql' | sort | xargs sha256sum | sha256sum | cut -d' ' -f1)" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
          build-args: |
            GIT_SHA=${{ steps.build-meta.outputs.git_sha }}
            BUILD_DATE=${{ steps.build-meta.outputs.build_date }}
            DOCKER_REPO=${{ secrets.DOCKERHUB_USERNAME }}/shipyard-backend
            MIGRATIONS_HASH=${{ steps.build-meta.outputs.migrations_hash }}

  # ── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    needs: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/shipyard-frontend
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  # ── Landing ────────────────────────────────────────────────────────────────
  landing:
    name: Landing
    runs-on: ubuntu-latest
    needs: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync scripts
        run: |
          cp scripts/install.sh landing/static/install.sh
          cp scripts/worker-setup.sh landing/static/worker-setup.sh
          cp scripts/update.sh landing/static/update.sh
          cp scripts/patch.sh landing/static/patch.sh

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/shipyard-landing
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./landing
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=landing
          cache-to: type=gha,mode=max,scope=landing

  # ── Edge Runtime ───────────────────────────────────────────────────────────
  edge-runtime:
    name: Edge Runtime
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/shipyard-edge-runtime
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./runtime
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=edge-runtime
          cache-to: type=gha,mode=max,scope=edge-runtime

  # ── Deploy landing ─────────────────────────────────────────────────────────
  deploy-landing:
    name: Deploy Landing
    runs-on: ubuntu-latest
    needs: landing
    steps:
      - name: Trigger deployment via webhook
        run: |
          curl -f -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.LANDING_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{"ref":"${{ github.ref_name }}","sha":"${{ github.sha }}"}'
