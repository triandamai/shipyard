# Traefik Static Configuration (Development)
api:
  dashboard: true
  insecure: true # Dashboard on :8080 without auth (dev only)

entryPoints:
  web:
    address: ":80"
  websecure:
    address: ":443"

providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    network: platform_proxy
  file:
    directory: /etc/traefik/dynamic
    watch: true

# Uncomment for production Let's Encrypt
# certificatesResolvers:
#   letsencrypt:
#     acme:
#       email: admin@example.com
#       storage: /letsencrypt/acme.json
#       httpChallenge:
#         entryPoint: web

log:
  level: DEBUG

accessLog: {}
