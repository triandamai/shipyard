#version: "3.8"

services:
  # ─── PostgreSQL ───────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: shipyard-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: shipyard
      POSTGRES_PASSWORD: shipyard
      POSTGRES_DB: shipyard
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shipyard"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── MQTT Broker (RMQTT) ─────────────────────────────────────
  mqtt:
    image: rmqtt/rmqtt:latest
    container_name: shipyard-mqtt
    restart: unless-stopped
    ports:
      - "1883:1883"   # MQTT TCP  (backend → broker)
      - "8883:8883"
      - "11883:11883"
      - "8083:8080"   # MQTT WebSocket (browser → broker)
    volumes:
      - ./rmqtt/rmqtt.toml:/app/rmqtt.toml:ro
      - rmqtt_data:/app/data

  # ─── Redis ───────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: shipyard-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── Traefik Reverse Proxy ───────────────────────────────────
  traefik:
    image: traefik:v3.1
    container_name: shipyard-traefik
    restart: unless-stopped
    command:
      - "--configFile=/etc/traefik/traefik.yml"
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"  # Traefik dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
      - traefik_certs:/letsencrypt
    networks:
      - platform_proxy

  # ─── Static site nginx ───────────────────────────────────────
  # Serves all static sites deployed via Shipyard.
  # The engine creates this container automatically on first static deploy,
  # but defining it here ensures it is present for local dev before any deploy.
  nginx-static:
    image: nginx:alpine
    container_name: shipyard-nginx-static
    restart: unless-stopped
    volumes:
      # Bind the sites dir at the same host path so nginx conf `root` directives
      # written by the engine (host absolute paths) resolve correctly inside the container.
      - /opt/shipyard/data/static:/opt/shipyard/data/static:ro
      # Also expose conf.d at the standard nginx include path.
      - /opt/shipyard/data/static/conf.d:/etc/nginx/conf.d:ro
    networks:
      - platform_proxy

networks:
  platform_proxy:
    name: platform_proxy
    external: true

volumes:
  postgres_data:
  rmqtt_data:
  redis_data:
  traefik_certs:
