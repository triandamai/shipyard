# Mosquitto Configuration (Development)
listener 1883
protocol mqtt

listener 9001
protocol websockets

# Remove the default 10 KB limit so the backend can publish larger payloads.
# Individual handlers already avoid large payloads, but this prevents
# broker-side disconnects from killing browser WebSocket sessions.
max_packet_size 0

allow_anonymous true
persistence true
persistence_location /mosquitto/data/

log_dest stdout
log_type all
