<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ .Title }}</title>
    <style>
      body { font-family: sans-serif; }
      main { max-width: 600px; margin: 80px auto; text-align: center; }
      h1   { color: #6366f1; }
      button {
        margin-top: 16px;
        padding: 10px 24px;
        background: #6366f1;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        cursor: pointer;
      }
      button:hover { opacity: 0.85; }
    </style>
  </head>
  <body>
    <main>
      {{ block "main" . }}{{ end }}
    </main>
    <script>
      let n = 0;
      const btn = document.getElementById('btn');
      if (btn) btn.addEventListener('click', () => { btn.textContent = `Clicked ${++n} times`; });
    </script>
  </body>
</html>
